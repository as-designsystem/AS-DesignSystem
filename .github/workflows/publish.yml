name: Publish CLI to GitHub Packages

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core and CLI
        run: pnpm --filter @as-design-system/core build && pnpm --filter @as-design-system/cli build

      - name: Check if version changed
        id: version-check
        working-directory: packages/cli
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @as-design-system/cli version 2>/dev/null || echo "none")
          if [ "$PACKAGE_VERSION" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish CLI
        if: steps.version-check.outputs.skip != 'true'
        working-directory: packages/cli
        run: npm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
